name: Publish invoica-mcp

on:
  push:
    tags:
      - 'npm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json

      - name: Build mcp-package/index.js (add shebang + compiled output)
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Debug — npm auth and package check
        run: |
          echo "=== npm whoami ==="
          npm whoami || echo "WHOAMI FAILED"
          echo "=== mcp-package/package.json ==="
          cat mcp-package/package.json
          echo "=== mcp-package contents ==="
          ls -la mcp-package/
          echo "=== index.js head ==="
          head -3 mcp-package/index.js
          echo "=== dry-run ==="
          npm publish mcp-package/ --dry-run 2>&1 || true

      - name: Publish to npm
        run: npm publish mcp-package/
