name: Publish invoica-mcp

# Triggered by: git tag npm-vX.Y.Z && git push origin npm-vX.Y.Z
#
# TOKENLESS — no NPM_TOKEN secret needed.
# GitHub OIDC lets npm issue a short-lived publish token at runtime.
# The package is also signed with a Sigstore attestation (provenance)
# that permanently links this build to the exact commit + workflow run.
#
# How it works:
#   1. id-token: write  → GitHub issues an OIDC JWT for this run
#   2. npm CLI exchanges that JWT with registry.npmjs.org for a temp token
#   3. npm publishes the package under your account (OIDC sub = repo identity)
#   4. npm attaches a Sigstore attestation so anyone can verify the build
#
# One-time requirement: your npm account must have GitHub linked at
#   https://www.npmjs.com/settings/<user>/profile (OAuth → Connect GitHub)

on:
  push:
    tags:
      - 'npm-v*'

permissions:
  id-token: write   # lets GitHub issue the OIDC token for npm auth + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json

      - name: Build mcp-package/index.js
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js

      - name: Publish to npm (tokenless OIDC + provenance)
        run: npm publish mcp-package/ --provenance --access public
        # No NODE_AUTH_TOKEN — OIDC JWT from id-token: write handles auth
